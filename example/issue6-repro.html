<!DOCTYPE html>
<meta charset="utf-8">
<title>Issue 6 Repro</title>
<body>
<script src="lib/d3/d3.js"></script>
<script src="../conrec.js"></script>
<script src="data.js"></script>
<script>

function addCliffEdge(data, cliff) {
  data.push(d3.range(data[0].length).map(function() { return cliff; }));
  data.unshift(d3.range(data[0].length).map(function() { return cliff; }));
  data.forEach(function(row) {
    row.push(cliff);
    row.unshift(cliff);
  });
}

function isClosed(points) {
  var first = points[0];
  var last = points[points.length - 1];
  var dx = first.x - last.x;
  var dy = first.y - last.y;
  return dx * dx + dy * dy < 1e-16;
}

var cliff = -1000;
var localData = data.map(function(row) { return row.slice(); });

addCliffEdge(localData, cliff);

var c = new Conrec,
    xs = d3.range(0, localData.length),
    ys = d3.range(0, localData[0].length),
    zs = [0],
    width = 800,
    height = 800,
    x = d3.scale.linear().range([0, width]).domain([0, localData.length]),
    y = d3.scale.linear().range([height, 0]).domain([0, localData[0].length]);

c.contour(localData, 0, xs.length - 1, 0, ys.length - 1, xs, ys, zs.length, zs);

var contourList = c.contourList();
var openContours = contourList.filter(function(points) {
  return !isClosed(points);
});

d3.select("body")
  .append("pre")
  .text([
    "Issue #6 repro",
    "Dataset: example/data.js",
    "Contour level: 0",
    "Total contours: " + contourList.length,
    "Open contours after cliff-edge padding: " + openContours.length,
    JSON.stringify(openContours.map(function(points) {
      return {
        level: points.level,
        length: points.length,
        start: points[0],
        end: points[points.length - 1]
      };
    }), null, 2)
  ].join("\n"));

d3.select("body").append("svg")
    .attr("width", width)
    .attr("height", height)
  .selectAll("path")
    .data(contourList)
  .enter().append("path")
    .style("fill", "#e76f51")
    .style("fill-opacity", 0.35)
    .style("stroke", function(points) {
      return isClosed(points) ? "#1d3557" : "#d00000";
    })
    .style("stroke-width", function(points) {
      return isClosed(points) ? 1.5 : 3;
    })
    .attr("d", d3.svg.line()
      .x(function(point) { return x(point.x); })
      .y(function(point) { return y(point.y); }));

</script>
