<!DOCTYPE html>
<meta charset="utf-8">
<title>Contour Demo</title>
<body>
<script src="lib/d3/d3.js"></script>
<script src="../conrec.js"></script>
<script src="data.js"></script>
<script>

// Add a "cliff edge" to force contour lines to close along the border.
var cliff = -1000;
data.push(d3.range(data[0].length).map(() => cliff));
data.unshift(d3.range(data[0].length).map(() => cliff));
data.forEach(d => {
  d.push(cliff);
  d.unshift(cliff);
});

var c = new Conrec,
    xs = d3.range(0, data.length),
    ys = d3.range(0, data[0].length),
    zs = d3.range(-5, 3, .5),
    width = 800,
    height = 800,
    x = d3.scale.linear().range([0, width]).domain([0, data.length]),
    y = d3.scale.linear().range([height, 0]).domain([0, data[0].length]),
    colours = d3.scale.linear().domain([-5, 3]).range(["#fff", "red"]);

c.contour(data, 0, xs.length - 1, 0, ys.length - 1, xs, ys, zs.length, zs);

var contourList = c.contourList();

contourList.forEach(d => {
  d.area = Math.abs(d3.geom.polygon(d.map(point => {
    return [point.x, point.y];
  })).area());
});

// Sort contours by area
contourList.sort((a, b) => b.area - a.area);

d3.select("body").append("svg")
    .attr("width", width)
    .attr("height", height)
  .selectAll("path")
    .data(contourList)
  .enter().append("path")
    .style("fill", d => colours(d.level))
    .style("stroke","black")
    .attr("d", d3.svg.line()
      .x(d => x(d.x))
      .y(d => y(d.y)));

</script>
